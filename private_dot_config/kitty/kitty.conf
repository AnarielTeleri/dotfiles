# Load the theme generated by 'kitten themes'.
include current-theme.conf

# Set the font, use less weird @&% etc. and enable some additional ligatures.
font_family family='Maple Mono' features='+cv01 +ss05 +ss08 +ss09 +ss10 +ss11'
bold_font auto
italic_font auto
bold_italic_font auto

font_size 26.0

# Use the symbols only font for special characters to avoid some glitches.
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,
    \U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ed00-U+efc1,
    \U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0
    \ Symbols Nerd Font Mono

# Enable the animated cursor.
cursor_trail 1
cursor_trail_start_threshold 0

# Force the window to be maximized by setting a size larger than possible.
initial_window_width 110c
initial_window_height 30c

# Remove wasteful titlebar decorations.
hide_window_decorations titlebar-only

# Use Catppuccin theme suggested tabs, but with a less blaring colour.
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

active_tab_foreground #CBA6F7
inactive_tab_background #11111B
active_tab_background #181825

# By default there is no mapping to go to specific tabs.
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+0 goto_tab 10
